name: Publish Package

on:
  push:
    tags:
      - 'v*'
  workflow_call:
    inputs:
      tag-ref:
        required: false
        type: string
        description: 'The git tag/ref to checkout for publishing'

permissions:
  id-token: write  # Required for OIDC
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag-ref || github.ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      
      - run: npm ci
      
      - run: npm run build --if-present
      
      - run: npm test
      
      - name: Publish to npm
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}